version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: queueflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: queueflow

  backend:
    build: ./backend
    container_name: queueflow-backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/queueflow
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  ai-service:
    build: ./ai-service
    container_name: queueflow-ai
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: queueflow-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo-data:
